name: CodeQL

# GitHub's first-party SAST. Runs on push, on PR, and weekly so newly
# disclosed CVE patterns are matched against the existing codebase even
# when nothing has changed. JavaScript covers TypeScript automatically.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Sunday 03:17 UTC — off-peak so it doesn't queue behind PR runs.
    - cron: "17 3 * * 0"

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript]
    steps:
      - uses: actions/checkout@v4

      - uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality

      - uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
