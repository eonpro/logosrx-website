name: CI

# Runs on every PR and every push to main. Workflow is intentionally split
# into independent jobs so a failing lint doesn't mask a typecheck or test
# regression — reviewers see all signals in parallel.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel an in-flight CI run for the same ref when a new commit is pushed.
# Saves Actions minutes and prevents flaky races on shared resources.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  install:
    name: Install dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci --no-audit --no-fund

  lint:
    name: Lint
    needs: install
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci --no-audit --no-fund
      - run: npm run lint

  typecheck:
    name: Typecheck
    needs: install
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci --no-audit --no-fund
      - run: npm run typecheck

  test:
    name: Unit tests
    needs: install
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci --no-audit --no-fund
      - run: npm run test:coverage
      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: coverage
          path: coverage/
          retention-days: 14

  build:
    name: Production build
    needs: install
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      # Provide just enough env to satisfy Clerk + Sentry build-time checks.
      # Real DSN / keys are wired in the Vercel pipeline, not here.
      NEXT_TELEMETRY_DISABLED: "1"
      SKIP_ENV_VALIDATION: "true"
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci --no-audit --no-fund
      - run: npm run build

  e2e:
    name: E2E smoke
    needs: install
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Throwaway Postgres for the DB-backed specs. The app reaches it via
    # DATABASE_URL (the non-IAM code path in src/lib/db/index.ts); production
    # never sets DATABASE_URL, so this can't affect the real auth path.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: logos_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      # Clerk *test* instance keys. Even the public specs need them because the
      # partner/admin route groups mount <ClerkProvider> and the proxy uses
      # clerkMiddleware. Set these repo secrets to turn the gate on.
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.E2E_CLERK_PUBLISHABLE_KEY }}
      CLERK_SECRET_KEY: ${{ secrets.E2E_CLERK_SECRET_KEY }}
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/logos_test
      NEXT_TELEMETRY_DISABLED: "1"
      SKIP_ENV_VALIDATION: "true"
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci --no-audit --no-fund

      # Without Clerk test creds the app can't boot for E2E. Skip cleanly (with
      # a visible notice) rather than failing, so forks/contributors aren't
      # blocked; the gate becomes real once the secrets are configured.
      - name: Detect E2E credentials
        id: creds
        run: |
          if [ -n "$NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY" ] && [ -n "$CLERK_SECRET_KEY" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::notice title=E2E skipped::Set E2E_CLERK_PUBLISHABLE_KEY and E2E_CLERK_SECRET_KEY repo secrets to enable the E2E gate."
          fi

      # Create the full schema in the throwaway Postgres from the Drizzle schema
      # (source of truth). Fresh DB → only CREATEs → no data-loss prompt.
      - name: Apply database schema
        if: steps.creds.outputs.present == 'true'
        run: npx drizzle-kit push

      - name: Install Playwright (chromium)
        if: steps.creds.outputs.present == 'true'
        run: npx playwright install --with-deps chromium

      - name: Build
        if: steps.creds.outputs.present == 'true'
        run: npm run build

      - name: Run E2E gate (DB-backed)
        if: steps.creds.outputs.present == 'true'
        env:
          # Run the built app for production-fidelity routing/middleware.
          PLAYWRIGHT_BASE_URL: http://localhost:3000
        run: |
          npm run start &
          for i in $(seq 1 60); do
            if curl -sf http://localhost:3000 >/dev/null; then break; fi
            sleep 1
          done
          # partners-public: routing, middleware protection, server-rendered
          # chrome. quote-public: exercises the real DB path (token lookup →
          # branded "not available" shell) against the Postgres service.
          # Fully Clerk-authenticated journeys (partners-auth.spec.ts) stay
          # self-gated behind E2E_PARTNER_AUTH=1; they need @clerk/testing
          # session wiring + seed data and run against a preview deploy.
          npx playwright test --project=desktop-chrome \
            tests/e2e/partners-public.spec.ts \
            tests/e2e/quote-public.spec.ts

      - name: Upload Playwright report
        if: steps.creds.outputs.present == 'true' && always()
        uses: actions/upload-artifact@v5
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

  schema:
    name: Structured data (Rich Results)
    needs: install
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      # Mirrors the build job — schema:check:ci builds, then validates the
      # JSON-LD in every prerendered page (required props, FAQ/Breadcrumb
      # shape, @id resolution, duplicate-node detection). Fails the gate on
      # any malformed or duplicated structured data.
      NEXT_TELEMETRY_DISABLED: "1"
      SKIP_ENV_VALIDATION: "true"
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci --no-audit --no-fund
      - run: npm run schema:check:ci

  security:
    name: Security scan
    needs: install
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      # Full history so the secret scan covers every commit in the ref, not
      # just the tip — a secret introduced and later "removed" still leaks.
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      # --- Secret scanning (gitleaks) ---------------------------------------
      # Run the pinned binary directly rather than the marketplace action so we
      # avoid its org-account license gate and keep the version reproducible.
      # `detect` scans the git history (tracked files only — never node_modules)
      # and exits non-zero on any finding not covered by .gitleaks.toml.
      - name: Secret scan (gitleaks)
        env:
          GITLEAKS_VERSION: "8.21.2"
        run: |
          curl -sSfL \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            -o gitleaks.tar.gz
          tar -xzf gitleaks.tar.gz gitleaks
          ./gitleaks detect \
            --source . \
            --config .gitleaks.toml \
            --redact \
            --no-banner \
            --exit-code 1

      # --- Dependency vulnerability gate ------------------------------------
      # Fails on any high/critical advisory not explicitly allowlisted in
      # scripts/audit-gate.ts. Needs node + the lockfile; install deps so the
      # tsx runner and an accurate `npm audit` tree are available.
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci --no-audit --no-fund
      - name: Dependency audit gate (high/critical)
        run: npm run audit:ci
