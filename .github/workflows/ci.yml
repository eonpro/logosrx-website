name: CI

# Runs on every PR and every push to main. Workflow is intentionally split
# into independent jobs so a failing lint doesn't mask a typecheck or test
# regression — reviewers see all signals in parallel.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel an in-flight CI run for the same ref when a new commit is pushed.
# Saves Actions minutes and prevents flaky races on shared resources.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  install:
    name: Install dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci --no-audit --no-fund

  lint:
    name: Lint
    needs: install
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --no-audit --no-fund
      - run: npm run lint

  typecheck:
    name: Typecheck
    needs: install
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --no-audit --no-fund
      - run: npm run typecheck

  test:
    name: Unit tests
    needs: install
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --no-audit --no-fund
      - run: npm run test:coverage
      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          retention-days: 14

  build:
    name: Production build
    needs: install
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      # Provide just enough env to satisfy Clerk + Sentry build-time checks.
      # Real DSN / keys are wired in the Vercel pipeline, not here.
      NEXT_TELEMETRY_DISABLED: "1"
      SKIP_ENV_VALIDATION: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --no-audit --no-fund
      - run: npm run build

  e2e:
    name: E2E smoke
    needs: install
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      # Clerk *test* instance keys. Even the public specs need them because the
      # partner/admin route groups mount <ClerkProvider> and the proxy uses
      # clerkMiddleware. Set these repo secrets to turn the gate on.
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.E2E_CLERK_PUBLISHABLE_KEY }}
      CLERK_SECRET_KEY: ${{ secrets.E2E_CLERK_SECRET_KEY }}
      NEXT_TELEMETRY_DISABLED: "1"
      SKIP_ENV_VALIDATION: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --no-audit --no-fund

      # Without Clerk test creds the app can't boot for E2E. Skip cleanly (with
      # a visible notice) rather than failing, so forks/contributors aren't
      # blocked; the gate becomes real once the secrets are configured.
      - name: Detect E2E credentials
        id: creds
        run: |
          if [ -n "$NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY" ] && [ -n "$CLERK_SECRET_KEY" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::notice title=E2E skipped::Set E2E_CLERK_PUBLISHABLE_KEY and E2E_CLERK_SECRET_KEY repo secrets to enable the E2E gate."
          fi

      - name: Install Playwright (chromium)
        if: steps.creds.outputs.present == 'true'
        run: npx playwright install --with-deps chromium

      - name: Build
        if: steps.creds.outputs.present == 'true'
        run: npm run build

      - name: Run public E2E smoke
        if: steps.creds.outputs.present == 'true'
        env:
          # Run the built app for production-fidelity routing/middleware.
          PLAYWRIGHT_BASE_URL: http://localhost:3000
        run: |
          npm run start &
          for i in $(seq 1 60); do
            if curl -sf http://localhost:3000 >/dev/null; then break; fi
            sleep 1
          done
          npx playwright test --project=desktop-chrome \
            tests/e2e/partners-public.spec.ts tests/e2e/quote-public.spec.ts

      - name: Upload Playwright report
        if: steps.creds.outputs.present == 'true' && always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

  schema:
    name: Structured data (Rich Results)
    needs: install
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      # Mirrors the build job — schema:check:ci builds, then validates the
      # JSON-LD in every prerendered page (required props, FAQ/Breadcrumb
      # shape, @id resolution, duplicate-node detection). Fails the gate on
      # any malformed or duplicated structured data.
      NEXT_TELEMETRY_DISABLED: "1"
      SKIP_ENV_VALIDATION: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --no-audit --no-fund
      - run: npm run schema:check:ci
