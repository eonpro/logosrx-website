name: CI

# Runs on every PR and every push to main. Workflow is intentionally split
# into independent jobs so a failing lint doesn't mask a typecheck or test
# regression — reviewers see all signals in parallel.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel an in-flight CI run for the same ref when a new commit is pushed.
# Saves Actions minutes and prevents flaky races on shared resources.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  install:
    name: Install dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci --no-audit --no-fund

  lint:
    name: Lint
    needs: install
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --no-audit --no-fund
      - run: npm run lint

  typecheck:
    name: Typecheck
    needs: install
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --no-audit --no-fund
      - run: npm run typecheck

  test:
    name: Unit tests
    needs: install
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --no-audit --no-fund
      - run: npm run test:coverage
      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          retention-days: 14

  build:
    name: Production build
    needs: install
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      # Provide just enough env to satisfy Clerk + Sentry build-time checks.
      # Real DSN / keys are wired in the Vercel pipeline, not here.
      NEXT_TELEMETRY_DISABLED: "1"
      SKIP_ENV_VALIDATION: "true"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --no-audit --no-fund
      - run: npm run build
